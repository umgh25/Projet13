<div class="chat-container">
  <h2>PoC - Chat Service Client</h2>

  <p *ngIf="!(connected$ | async)">Connexion au chat...</p>
  <p *ngIf="connected$ | async">Connecté au chat</p>

  <div class="form-row">
    <input [(ngModel)]="sender" placeholder="Votre nom" />
    <select [(ngModel)]="role">
      <option value="CLIENT">CLIENT</option>
      <option value="AGENT">AGENT</option>
    </select>
  </div>

  <ng-container *ngIf="messages$ | async as messages">
    <div class="messages-box">
      <div *ngFor="let msg of messages">
        <strong>{{ msg.sender }}</strong> ({{ msg.role }}) :
        {{ msg.content }}
      </div>
    </div>
  </ng-container>

  <div class="form-row">
    <input [(ngModel)]="content" placeholder="Message..." />
    <button (click)="send()" [disabled]="!(connected$ | async)">Envoyer</button>
  </div>
</div>
